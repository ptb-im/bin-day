name: Weekly bin reminder

on:
  schedule:
    # 21:00 UK time. GitHub cron is always UTC: 20:00 UTC = 9pm BST (summer),
    # 21:00 UTC = 9pm GMT (winter). Set for BST (current, summer) - shift by
    # 1 hour ("0 21 * * 1") once clocks go back in late October if you want
    # it to stay at exactly 9pm year-round.
    - cron: "0 20 * * 1"
  workflow_dispatch: {}   # lets you manually trigger a run from the Actions tab to test

jobs:
  add-bin-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape bin day and create TickTick task
        env:
          BIN_PAGE_URL: "https://www.southlanarkshire.gov.uk/directory_record/574625/craigwell_avenue_cambuslang"
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
          TICKTICK_PROJECT_ID: ${{ secrets.TICKTICK_PROJECT_ID }}
        run: python scrape_and_add_task.py
