name: Weekly bin reminder

on:
  schedule:
    # 09:00 UK time. GitHub cron is always UTC: 08:00 UTC = 9am BST (summer),
    # 09:00 UTC = 9am GMT (winter). Set for BST (current, summer) - shift to
    # "0 9 * * 1" once clocks go back in late October if you want it to stay
    # at exactly 9am year-round. Running in the morning (rather than close to
    # the 10pm reminder time) avoids TickTick potentially treating a
    # near-immediate due time as ambiguous.
    - cron: "0 8 * * 1"
  workflow_dispatch: {}   # lets you manually trigger a run from the Actions tab to test

jobs:
  add-bin-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Scrape bin day and create TickTick task
        env:
          BIN_PAGE_URL: "https://www.southlanarkshire.gov.uk/directory_record/574625/craigwell_avenue_cambuslang"
          TICKTICK_ACCESS_TOKEN: ${{ secrets.TICKTICK_ACCESS_TOKEN }}
          TICKTICK_PROJECT_ID: ${{ secrets.TICKTICK_PROJECT_ID }}
        run: python scrape_and_add_task.py
